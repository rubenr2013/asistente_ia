# =============================================
# Configuración para desplegar en Render.com
# Render lee este archivo y configura todo automático
# =============================================

services:
  - type: web
    name: aria-asistente
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn asistente_ia.wsgi:application
    plan: free
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: aria-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false

databases:
  - name: aria-db
    plan: free
    databaseName: asistente_ia
